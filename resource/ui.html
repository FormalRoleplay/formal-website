<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="store-container" id="storeContainer" style="display: none;">
        <div class="logo-container" id="logoContainer" style="display: none;">
            <img id="logoImage" src="" alt="Logo" class="logo-image">
        </div>
        <div class="store-top">
            <div class="store-header">
                <h1 class="store-title" id="storeTitle">Menu</h1>
                <div class="header-right">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search">
                        <i class="fas fa-search search-icon"></i>
                    </div>
                    <button class="close-btn" id="closeBtn" title="Close (ESC)">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">
                    <i class="fas fa-bars filter-icon"></i>
                    <span>All</span>
                </button>
                <button class="filter-btn" data-category="drink">
                    <i class="fas fa-wine-bottle filter-icon"></i>
                </button>
                <button class="filter-btn" data-category="food">
                    <i class="fas fa-utensils filter-icon"></i>
                </button>
                <button class="filter-btn" data-category="other">
                    <i class="fas fa-minus filter-icon"></i>
                </button>
            </div>
            
            <div class="items-grid" id="itemsGrid"></div>
        </div>
        
        <div class="store-bottom">
            <div class="cart-header">
                <h2 class="cart-title">Shopping Cart</h2>
                <div class="weight-display" id="weightDisplay">0 KG / 0 KG</div>
            </div>
            
            <div class="cart-content-wrapper">
                <div class="cart-dropzone" id="cartDropzone">
                    <i class="fas fa-box-open dropzone-icon"></i>
                    <p class="dropzone-text">Drag what you want to buy here.</p>
                    <p class="dropzone-hint">You can also SHIFT + Click to bulk add items to cart.</p>
                    <p class="dropzone-hint">Or, SHIFT + Right Click to decrease/remove items.</p>
                </div>
                
                <div class="cart-items" id="cartItems"></div>
            </div>
            
            <div class="cart-footer">
                <div class="total-amount">
                    <span class="total-label">Total amount</span>
                    <span class="total-value" id="totalValue">$0</span>
                </div>
                <div class="payment-buttons">
                    <button class="pay-btn pay-cash" id="payCashBtn">
                        <i class="fas fa-money-bill-wave pay-icon"></i>
                        <span>PAY WITH CASH</span>
                    </button>
                    <button class="pay-btn pay-bank" id="payBankBtn">
                        <i class="fas fa-university pay-icon"></i>
                        <span>PAY WITH BANK</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="quantity-modal" id="quantityModal" style="display: none;">
        <div class="quantity-modal-content">
            <div class="quantity-modal-header">
                <h3 class="quantity-modal-title" id="quantityModalTitle">Enter Quantity</h3>
                <button class="quantity-modal-close" id="quantityModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="quantity-modal-body">
                <div class="quantity-modal-item" id="quantityModalItem"></div>
                <div class="quantity-modal-price" id="quantityModalPrice"></div>
                <div class="quantity-input-wrapper">
                    <label for="quantityInput" class="quantity-label">Quantity:</label>
                    <input type="number" id="quantityInput" class="quantity-input" min="1" max="999" value="1">
                </div>
                <div class="quantity-total" id="quantityTotal">Total: $0</div>
            </div>
            <div class="quantity-modal-footer">
                <button class="quantity-btn quantity-btn-cancel" id="quantityCancelBtn">Cancel</button>
                <button class="quantity-btn quantity-btn-confirm" id="quantityConfirmBtn">Add to Cart</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
